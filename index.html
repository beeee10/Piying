<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮影戏</title>
<style>
  body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  video { max-width: 100%; max-height: 80vh; border-radius: 4px; }
  .list { display: flex; gap: 12px; padding: 16px; flex-wrap: wrap; justify-content: center; }
  button { padding: 10px 24px; font-size: 16px; border: 2px solid #fff; background: transparent; color: #fff; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  button:hover { background: #fff; color: #000; }
</style>
</head>
<body>
<video id="player" controls autoplay loop></video>
<div class="list">
  <button onclick="play('皮影戏1.mp4')">皮影戏1</button>
  <button onclick="play('皮影戏2.mp4')">皮影戏2</button>
  <button onclick="play('皮影戏3.mp4')">皮影戏3</button>
</div>
<script>
function play(name) {
  var player = document.getElementById('player');
  player.src = name;
  player.play();
}
play('皮影戏1.mp4');
</script>
</body>
</html>
