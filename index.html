<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮影戏</title>
<style>
  body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  video { max-width: 100%; max-height: 90vh; }
</style>
</head>
<body>
<video id="player" controls autoplay loop></video>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var v = params.get('v') || '1';
  var player = document.getElementById('player');
  player.src = '皮影戏' + v + '.mp4';
  player.play();
})();
</script>
</body>
</html>
